<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>
    <div th:replace="~{fragments/header :: navbar}"></div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Admin Dashboard</h2>
            <a href="/admin/events/new" class="btn btn-primary"><i class="bi bi-plus-circle"></i> Create New Event</a>
        </div>

        <div th:if="${param.success}" class="alert alert-success">Event saved successfully!</div>
        <div th:if="${param.deleted}" class="alert alert-success">Event deleted successfully!</div>

        <!-- Dashboard Stats -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card bg-primary text-white h-100 shadow-sm">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-uppercase mb-1">Total Events</h6>
                                <h2 class="mb-0" th:text="${#lists.size(events)}">0</h2>
                            </div>
                            <i class="bi bi-calendar-event fs-1 text-white-50"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-success text-white h-100 shadow-sm">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-uppercase mb-1">Total Capacity</h6>
                                <h2 class="mb-0" th:text="${#aggregates.sum(events.![capacity])}">0</h2>
                            </div>
                            <i class="bi bi-people fs-1 text-white-50"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-info text-white h-100 shadow-sm">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-uppercase mb-1">Active Events</h6>
                                <h2 class="mb-0" th:text="${#lists.size(events)}">0</h2>
                            </div>
                            <i class="bi bi-activity fs-1 text-white-50"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Events Table -->
        <div class="card shadow-sm">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0">Manage Events</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Title</th>
                                <th>Date</th>
                                <th>Type</th>
                                <th>Capacity</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="event : ${events}">
                                <td th:text="${event.id}">1</td>
                                <td class="fw-bold" th:text="${event.title}">Title</td>
                                <td th:text="${#temporals.format(event.date, 'dd MMM yyyy')}">Date</td>
                                <td><span class="badge bg-secondary" th:text="${event.type}">Type</span></td>
                                <td th:text="${event.capacity}">100</td>
                                <td>
                                    <a th:href="@{/admin/events/edit/{id}(id=${event.id})}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
                                    <a th:href="@{/admin/events/delete/{id}(id=${event.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Are you sure you want to delete this event?');"><i class="bi bi-trash"></i></a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(events)}">
                                <td colspan="6" class="text-center py-4">No events found. Create one to get started!</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/header :: chatbot-widget}"></div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
