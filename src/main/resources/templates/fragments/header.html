<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.html" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Smart Campus Events</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(-45deg, #e0c3fc, #8ec5fc, #fbc2eb, #a18cd1);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .navbar-brand { font-weight: bold; color: #4e73df !important; }
        .card { border: none; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .btn-primary { background-color: #4e73df; border: none; }
        .btn-primary:hover { background-color: #2e59d9; }
        
        /* Dark Mode */
        body.dark-mode { 
            background: linear-gradient(-45deg, #1a1a2e, #16213e, #0f3460, #e94560);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff; 
        }
        .dark-mode .card { background-color: rgba(30, 30, 30, 0.9); color: #ffffff; backdrop-filter: blur(10px); }
        .dark-mode .navbar { background-color: #1e1e1e !important; }
        .dark-mode .navbar-light .navbar-nav .nav-link { color: #dddddd; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4" th:fragment="navbar">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-calendar-event"></i> Smart Campus
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/events">Events</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item d-flex align-items-center me-3">
                        <button id="darkModeToggle" class="btn btn-outline-secondary btn-sm">
                            <i class="bi bi-moon"></i>
                        </button>
                    </li>
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" href="/login">Login</a>
                    </li>
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" href="/register">Register</a>
                    </li>
                    
                    <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                            <span sec:authentication="name">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li sec:authorize="hasRole('ADMIN')"><a class="dropdown-item" href="/admin/dashboard">Admin Dashboard</a></li>
                            <li sec:authorize="hasRole('STUDENT')"><a class="dropdown-item" href="/student/dashboard">Student Dashboard</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form action="/logout" method="post" class="d-inline">
                                    <!-- csrf token not required as it's disabled in security config, but form needed for POST -->
                                    <button type="submit" class="dropdown-item">Logout</button>
                                </form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div th:fragment="chatbot-widget">
        <!-- Chatbot Widget -->
        <div id="chatbot-container" style="position: fixed; bottom: 20px; right: 20px; width: 300px; z-index: 1000; display: none;" class="card shadow-lg">
            <div class="card-header bg-primary text-white d-flex justify-content-between">
                <span><i class="bi bi-robot"></i> Smart Assistant</span>
                <button class="btn-close btn-close-white" onclick="toggleChat()"></button>
            </div>
            <div class="card-body" id="chat-messages" style="height: 250px; overflow-y: auto; background-color: #f8f9fa;">
                <div class="mb-2 text-start"><span class="badge bg-secondary p-2 text-wrap" style="max-width:80%;">Hello! Ask me about events.</span></div>
            </div>
            <div class="card-footer p-2">
                <div class="input-group">
                    <input type="text" id="chat-input" class="form-control" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
                    <button class="btn btn-primary" onclick="sendMessage()"><i class="bi bi-send"></i></button>
                </div>
            </div>
        </div>
        <button id="chatbot-btn" class="btn btn-primary rounded-circle shadow-lg" style="position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; z-index: 999;" onclick="toggleChat()">
            <i class="bi bi-chat-dots" style="font-size: 24px;"></i>
        </button>

        <!-- Bootstrap JS and Core Scripts -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            // Dark mode toggle
            const toggleBtn = document.getElementById('darkModeToggle');
            const body = document.body;
            
            if(localStorage.getItem('darkMode') === 'enabled') {
                body.classList.add('dark-mode');
                toggleBtn.innerHTML = '<i class="bi bi-sun"></i>';
            }

            toggleBtn.addEventListener('click', () => {
                body.classList.toggle('dark-mode');
                if (body.classList.contains('dark-mode')) {
                    localStorage.setItem('darkMode', 'enabled');
                    toggleBtn.innerHTML = '<i class="bi bi-sun"></i>';
                } else {
                    localStorage.setItem('darkMode', 'disabled');
                    toggleBtn.innerHTML = '<i class="bi bi-moon"></i>';
                }
            });

            // Chatbot functions
            function toggleChat() {
                const container = document.getElementById('chatbot-container');
                const btn = document.getElementById('chatbot-btn');
                if (container.style.display === 'none') {
                    container.style.display = 'block';
                    btn.style.display = 'none';
                } else {
                    container.style.display = 'none';
                    btn.style.display = 'block';
                }
            }

            function handleKeyPress(e) {
                if(e.key === 'Enter') sendMessage();
            }

            async function sendMessage() {
                const input = document.getElementById('chat-input');
                const msg = input.value.trim();
                if (!msg) return;

                const messagesDiv = document.getElementById('chat-messages');
                messagesDiv.innerHTML += `<div class="mb-2 text-end"><span class="badge bg-primary p-2 text-wrap" style="max-width:80%;">${msg}</span></div>`;
                input.value = '';
                messagesDiv.scrollTop = messagesDiv.scrollHeight;

                try {
                    const response = await fetch('/api/chatbot/query', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({message: msg})
                    });
                    const data = await response.json();
                    
                    setTimeout(() => {
                        messagesDiv.innerHTML += `<div class="mb-2 text-start"><span class="badge bg-secondary p-2 text-wrap" style="max-width:80%;">${data.response}</span></div>`;
                        messagesDiv.scrollTop = messagesDiv.scrollHeight;
                    }, 500);
                } catch (e) {
                    console.error('Error communicating with chatbot API');
                }
            }
        </script>
    </div>
</body>
</html>
