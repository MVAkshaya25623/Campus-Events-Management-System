<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head}"></head>
<body>
    <div th:replace="~{fragments/header :: navbar}"></div>

    <div class="container mt-5">
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="row">
            <div class="col-md-8">
                <div class="card shadow-sm mb-4">
                    <div class="card-body p-5">
                        <span class="badge bg-primary mb-3" th:text="${event.type}">Type</span>
                        <h2 class="mb-3" th:text="${event.title}">Event Title</h2>
                        
                        <div class="d-flex mb-4 text-muted border-bottom pb-3">
                            <div class="me-4"><i class="bi bi-calendar3"></i> <span th:text="${#temporals.format(event.date, 'EEEE, dd MMMM yyyy HH:mm')}">Date</span></div>
                            <div class="me-4"><i class="bi bi-geo-alt"></i> <span th:text="${event.location}">Location</span></div>
                            <div><i class="bi bi-building"></i> <span th:text="${event.department}">Department</span></div>
                        </div>
                        
                        <h4>About this event</h4>
                        <p class="mt-3" style="white-space: pre-line;" th:text="${event.description}">Description</p>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card shadow-sm sticky-top" style="top: 20px;">
                    <div class="card-body">
                        <h4 class="card-title mb-4">Registration</h4>
                        
                        <div class="d-flex justify-content-between mb-3 border-bottom pb-2">
                            <span>Capacity:</span>
                            <span class="fw-bold" th:text="${event.capacity} + ' seats'">0</span>
                        </div>
                        
                        <div sec:authorize="hasRole('STUDENT')">
                            <form th:action="@{/student/events/{id}/register(id=${event.id})}" method="post">
                                <button type="submit" class="btn btn-primary btn-lg w-100 mb-2">Register Now</button>
                            </form>
                            <p class="text-muted small text-center">By registering, you agree to the campus event guidelines.</p>
                        </div>
                        
                        <div sec:authorize="hasRole('ADMIN')">
                            <div class="alert alert-info">Admins cannot register for events.</div>
                        </div>

                        <div sec:authorize="!isAuthenticated()">
                            <div class="alert alert-warning text-center">
                                Please <a href="/login">login</a> or <a href="/register">register</a> to sign up for this event.
                            </div>
                        </div>
                        
                        <div class="mt-4">
                            <h5>Share Event</h5>
                            <div class="d-flex gap-2 mt-2">
                                <button class="btn btn-outline-secondary"><i class="bi bi-facebook"></i></button>
                                <button class="btn btn-outline-secondary"><i class="bi bi-twitter-x"></i></button>
                                <button class="btn btn-outline-secondary"><i class="bi bi-linkedin"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/header :: chatbot-widget}"></div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
