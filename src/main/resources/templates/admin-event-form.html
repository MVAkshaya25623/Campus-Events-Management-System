<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body class="bg-light">
    <div th:replace="~{fragments/header :: navbar}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-white py-3">
                        <h4 class="mb-0" th:text="${event.id == null ? 'Create New Event' : 'Edit Event'}">Create Event</h4>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/admin/events}" th:object="${event}" method="post">
                            <input type="hidden" th:field="*{id}">
                            
                            <div class="row mb-3">
                                <div class="col-md-12">
                                    <label class="form-label">Title</label>
                                    <input type="text" th:field="*{title}" class="form-control" th:errorclass="is-invalid" required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                                </div>
                            </div>
                            
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Date & Time</label>
                                    <input type="datetime-local" th:field="*{date}" class="form-control" th:errorclass="is-invalid" required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Location</label>
                                    <input type="text" th:field="*{location}" class="form-control" th:errorclass="is-invalid" required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></div>
                                </div>
                            </div>
                            
                            <div class="row mb-3">
                                <div class="col-md-4">
                                    <label class="form-label">Department</label>
                                    <select th:field="*{department}" class="form-select">
                                        <option value="Computer Science">Computer Science</option>
                                        <option value="Engineering">Engineering</option>
                                        <option value="Business">Business</option>
                                        <option value="Arts">Arts</option>
                                        <option value="General">General</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Type</label>
                                    <select th:field="*{type}" class="form-select">
                                        <option value="Workshop">Workshop</option>
                                        <option value="Seminar">Seminar</option>
                                        <option value="Hackathon">Hackathon</option>
                                        <option value="Conference">Conference</option>
                                        <option value="Social">Social</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Capacity</label>
                                    <input type="number" th:field="*{capacity}" class="form-control" th:errorclass="is-invalid" min="1" required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('capacity')}" th:errors="*{capacity}"></div>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label">Description</label>
                                <textarea th:field="*{description}" class="form-control" rows="5" required></textarea>
                            </div>
                            
                            <div class="d-flex justify-content-end gap-2">
                                <a href="/admin/dashboard" class="btn btn-outline-secondary">Cancel</a>
                                <button type="submit" class="btn btn-primary px-4">Save Event</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/header :: chatbot-widget}"></div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
